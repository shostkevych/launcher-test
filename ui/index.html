<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
      :root {
        --primary: #0a0e27;
        --secondary: #1a1f3a;
        --accent: #6366f1;
        --accent-light: #818cf8;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --gradient-start: #6366f1;
        --gradient-end: #8b5cf6;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 
          'Helvetica Neue', Arial, sans-serif;
        background: var(--primary);
        color: var(--text);
        overflow-x: hidden;
        min-height: 100vh;
      }

      .container {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      
      .background {
        position: absolute;
        inset: 0;
        z-index: 0;
      }
      
      .gradient-orb {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, 
          rgba(99, 102, 241, 0.15) 0%, 
          rgba(139, 92, 246, 0.1) 40%,
          transparent 70%);
        border-radius: 50%;
        filter: blur(80px);
        left: calc(50% - 300px);
        top: calc(50% - 300px);
        transition: left 0.3s ease-out, top 0.3s ease-out;
        pointer-events: none;
      }
      
      .grid-pattern {
        position: absolute;
        inset: 0;
        background-image: 
          linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        opacity: 0.5;
      }
      
      .content {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 900px;
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 0.8s ease-out, transform 0.8s ease-out;
      }
      
      .content.fade-in {
        opacity: 1;
        transform: translateY(0);
      }
      
      .logo-container {
        margin-bottom: 3rem;
        display: flex;
        justify-content: center;
      }
      
      .logo {
        animation: float 6s ease-in-out infinite;
        filter: drop-shadow(0 10px 30px rgba(99, 102, 241, 0.3));
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(5deg); }
      }
      
      .title {
        font-size: clamp(3rem, 8vw, 5.5rem);
        font-weight: 700;
        line-height: 1.1;
        margin-bottom: 1.5rem;
        letter-spacing: -0.02em;
      }
      
      .title-line {
        display: block;
        background: linear-gradient(135deg, var(--text) 0%, var(--text-muted) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .title-line.accent {
        background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      
      .subtitle {
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        color: var(--text-muted);
        margin-bottom: 4rem;
        font-weight: 400;
        letter-spacing: 0.01em;
      }
      
      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 2rem;
        margin-top: 4rem;
      }
      
      .feature-card {
        background: rgba(26, 31, 58, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(99, 102, 241, 0.2);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0;
        transform: translateY(30px);
        animation: slideUp 0.6s ease-out forwards;
      }
      
      @keyframes slideUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .feature-card:nth-child(1) {
        animation-delay: 0.1s;
      }
      
      .feature-card:nth-child(2) {
        animation-delay: 0.2s;
      }
      
      .feature-card:nth-child(3) {
        animation-delay: 0.3s;
      }
      
      .feature-card:hover {
        transform: translateY(-8px);
        border-color: rgba(99, 102, 241, 0.5);
        box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2);
        background: rgba(26, 31, 58, 0.8);
      }
      
      .feature-icon {
        font-size: 2.5rem;
        margin-bottom: 1rem;
        filter: grayscale(0.3);
        transition: filter 0.3s ease;
      }
      
      .feature-card:hover .feature-icon {
        filter: grayscale(0);
      }
      
      .feature-card h3 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        color: var(--text);
      }
      
      .feature-card p {
        font-size: 0.95rem;
        color: var(--text-muted);
        line-height: 1.6;
      }
      
      @media (max-width: 768px) {
        .features {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }
        
        .feature-card {
          padding: 2rem 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="background">
        <div class="gradient-orb" id="gradientOrb"></div>
        <div class="grid-pattern"></div>
      </div>
      
      <main class="content" id="content">
        <div class="logo-container">
          <div class="logo">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
              <circle cx="32" cy="32" r="28" stroke="url(#logoGradient)" stroke-width="2" opacity="0.8"/>
              <path d="M32 12 L32 32 L44 38" stroke="url(#logoGradient)" stroke-width="2.5" 
                    stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
              <defs>
                <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--accent-light)"/>
                  <stop offset="100%" stop-color="var(--accent)"/>
                </linearGradient>
              </defs>
            </svg>
          </div>
        </div>
        
        <h1 class="title">
          <span class="title-line">Version 8</span>
          <span class="title-line accent">Post-Fix Deploy C</span>
        </h1>
        
        <p class="subtitle">
          Experience something extraordinary
        </p>
        
        <div class="features">
          <div class="feature-card">
            <div class="feature-icon">⚡</div>
            <h3>Fast</h3>
            <p>Lightning quick performance</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">🎨</div>
            <h3>Beautiful</h3>
            <p>Thoughtfully designed</p>
          </div>
          <div class="feature-card">
            <div class="feature-icon">🚀</div>
            <h3>Modern</h3>
            <p>Built with latest tech</p>
          </div>
        </div>
      </main>
    </div>

    <script>
      // Initialize on page load
      document.addEventListener('DOMContentLoaded', () => {
        const content = document.getElementById('content');
        const gradientOrb = document.getElementById('gradientOrb');
        
        // Fade in content
        setTimeout(() => {
          content.classList.add('fade-in');
        }, 100);
        
        // Mouse tracking for gradient orb
        const handleMouseMove = (e) => {
          const x = e.clientX - 300;
          const y = e.clientY - 300;
          gradientOrb.style.left = x + 'px';
          gradientOrb.style.top = y + 'px';
        };
        
        window.addEventListener('mousemove', handleMouseMove);
      });
    </script>
  </body>
</html>
